<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ciné Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#e8c97a;--dark:#0e0e10;--mid:#1c1c1f;--border:rgba(255,255,255,0.08);--text:#f0ede8;--muted:#777}
html,body{width:100%;height:100%;background:var(--dark);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden;touch-action:manipulation}

#splash{
  position:fixed;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--dark);gap:40px;
  animation:fadeIn .6s ease;
}

#splash h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.5rem,8vw,4rem);
  letter-spacing:-.02em;
  background:linear-gradient(135deg,#e8c97a,#f0ede8 60%,#b08d4a);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}

#splash p{
  color:var(--muted);
  font-size:.8rem;
  letter-spacing:.15em;
  text-transform:uppercase;
  margin-top:-28px;
}

.splash-btns{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  justify-content:center;
  padding:0 24px;
}

.splash-btn{
  padding:16px 36px;
  border:1px solid var(--border);
  background:var(--mid);
  color:var(--text);
  font-family:'DM Mono',monospace;
  font-size:.85rem;
  letter-spacing:.1em;
  cursor:pointer;
  border-radius:4px;
  transition:all .2s;
  text-transform:uppercase;
  text-decoration:none;
  display:inline-block;
}
.splash-btn:hover{border-color:var(--accent);color:var(--accent)}
.splash-btn.primary{background:var(--accent);color:var(--dark);border-color:var(--accent);font-weight:500}
.splash-btn.primary:hover{opacity:.9;color:var(--dark)}

.splash-version{
  position:fixed;
  bottom:20px;
  font-size:.6rem;
  color:var(--muted);
  letter-spacing:.12em;
  text-transform:uppercase;
}
.splash-version a{color:var(--muted);text-decoration:none}
.splash-version a:hover{color:var(--text)}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="splash">
  <div>
    <h1>Ciné Light</h1>
    <p>Éclairage cinéma piloté à distance</p>
  </div>

  <div class="splash-btns">
    <a class="splash-btn primary" href="screen.html">📱→🎬 Télécommande</a>
    <a class="splash-btn" href="screen.html">🟡 Écran projecteur</a>
    <a class="splash-btn" href="screen.html">🎛 Mode DMX</a>
  </div>

  <p class="splash-version">
    <a href="https://github.com/Pierre-ITSI/cine-light" target="_blank" rel="noopener">
      GitHub — Pierre-ITSI/cine-light
    </a>
  </p>
</div>

</body>
</html>
